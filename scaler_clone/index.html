<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scaler Academy Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="https://www.scaler.com/assets/images/logo.svg" alt="Scaler Logo">
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="#">Courses</a></li>
                    <li><a href="#">Success Stories</a></li>
                    <li><a href="#">Community</a></li>
                    <li><a href="#">Events</a></li>
                    <li><a href="#">About Us</a></li>
                </ul>
            </nav>
            <button class="apply-now">Apply Now</button>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Transform Your Career with Scaler</h1>
            <p>Get mentored by industry experts and land your dream job.</p>
            <button class="learn-more">Learn More</button>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 Scaler Academy. All rights reserved.</p>
            <div class="social-links">
                <a href="#"><img src="https://img.icons8.com/ios-filled/24/000000/facebook-new.png" alt="Facebook"></a>
                <a href="#"><img src="https://img.icons8.com/ios-filled/24/000000/twitter--v1.png" alt="Twitter"></a>
                <a href="#"><img src="https://img.icons8.com/ios-filled/24/000000/linkedin.png" alt="LinkedIn"></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
